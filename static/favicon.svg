<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a52d5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rect for contrast (optional, usually transparent is better) -->
  
  <!-- Back Card -->
  <rect x="6" y="4" width="12" height="18" rx="3" fill="#3F3D56" transform="rotate(-10 16 16)" />
  
  <!-- Front Card -->
  <rect x="11" y="8" width="14" height="20" rx="3" fill="url(#fav-grad)" transform="rotate(5 18 18)" />
  
  <!-- Single Pin (simplified) -->
  <circle cx="18" cy="12" r="1.5" fill="#FAFAF8" opacity="0.9" transform="rotate(5 18 18)" />
</svg>
