<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#6C63FF" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- PWA: Apple Web App -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Nearboard" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />

		<!-- iOS Splash Screens (apple-touch-startup-image) -->
		<!-- iPhone SE, 8, 7, 6s (750x1334) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
		<!-- iPhone 8 Plus, 7 Plus, 6s Plus (1242x2208) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone X, XS, 11 Pro (1125x2436) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone XR, 11 (828x1792) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
		<!-- iPhone XS Max, 11 Pro Max (1242x2688) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 12 mini, 13 mini (1080x2340) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 360px) and (device-height: 780px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 12, 12 Pro, 13, 13 Pro, 14 (1170x2532) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 12 Pro Max, 13 Pro Max, 14 Plus (1284x2778) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 14 Pro (1179x2556) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 14 Pro Max (1290x2796) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 15, 15 Pro, 16 (1179x2556) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 15 Plus, 15 Pro Max, 16 Plus (1290x2796) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 16 Pro (1206x2622) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" />
		<!-- iPhone 16 Pro Max (1320x2868) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash.png"
			media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" />

		<!-- Fonts: Inter Variable (body) + Fraunces (display) -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@100..900&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app">%sveltekit.body%</div>
	</body>
</html>
