<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a52d5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="5" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle (Optional, useful for adaptive icons) -->
  <!-- <circle cx="256" cy="256" r="256" fill="#FAFAF8" /> -->

  <!-- Back Card (Vertical) -->
  <rect x="136" y="96" width="160" height="240" rx="24" fill="#3F3D56" opacity="0.8" transform="rotate(-10 216 216)" />

  <!-- Front Card (Angled) -->
  <rect x="180" y="140" width="180" height="260" rx="24" fill="url(#grad1)" filter="url(#shadow)" transform="rotate(5 270 270)" />

  <!-- Pin / Accent Element -->
  <circle cx="270" cy="180" r="12" fill="#FAFAF8" opacity="0.9" transform="rotate(5 270 270)" />
  
  <!-- "N" Suggestion or Content Lines -->
  <g transform="rotate(5 270 270)" opacity="0.6">
      <rect x="210" y="220" width="120" height="12" rx="6" fill="#FAFAF8" />
      <rect x="210" y="250" width="80" height="12" rx="6" fill="#FAFAF8" />
      <rect x="210" y="280" width="100" height="12" rx="6" fill="#FAFAF8" />
  </g>
</svg>
